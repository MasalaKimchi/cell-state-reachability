<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>0 of 91 — the capability the toolbox is missing</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161c24; --ink:#e8edf2; --dim:#8b97a6; --line:#2a333f;
    --lof:#1f9e89; --gof:#d99b2b; --neither:#c7cdd6; --target:#e8edf2; --accent:#4aa3df;
    --stop:#d9534f; --good:#4fd6c0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  header{padding:22px 26px 14px;border-bottom:1px solid var(--line)}
  h1{margin:0 0 4px;font-size:19px;font-weight:650;letter-spacing:.2px}
  header p{margin:0;color:var(--dim);font-size:13px;max-width:80ch}
  .wrap{display:grid;grid-template-columns:minmax(420px,1fr) minmax(360px,1fr);gap:0}
  @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  .col{padding:20px 26px} .col.left{border-right:1px solid var(--line)}
  .sub{font-size:11px;text-transform:uppercase;letter-spacing:1.3px;color:var(--dim);margin:0 0 10px}
  svg{width:100%;height:auto;display:block}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:650;letter-spacing:.3px;margin-bottom:12px}
  .badge.p{background:#123d38;color:#4fd6c0;border:1px solid #1f6a5f}
  .badge.w{background:#3d3212;color:#e6bd5b;border:1px solid #6a561f}
  .badge.s{background:#3d1a18;color:#f0a09c;border:1px solid #7a2f2b}
  .stat{display:flex;gap:18px;margin:2px 0 16px;flex-wrap:wrap}
  .stat div{font-size:12px;color:var(--dim)}
  .stat b{display:block;font-size:20px;color:var(--ink);font-weight:650;font-variant-numeric:tabular-nums}
  .bar{display:flex;height:34px;border-radius:6px;overflow:hidden;margin:4px 0 6px;font-size:12px;font-weight:600}
  .bar>span{display:flex;align-items:center;justify-content:center;color:#0d1117;min-width:0;transition:flex-basis .35s ease}
  .barkey{display:flex;gap:16px;font-size:11px;color:var(--dim);margin-bottom:20px}
  .barkey i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px}
  .tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:7px 12px;cursor:pointer;font-size:13px;color:var(--dim);border-bottom:2px solid transparent}
  .tab.on{color:var(--ink);border-bottom-color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{text-align:left;padding:5px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.8px}
  td.n{text-align:right;font-variant-numeric:tabular-nums;color:var(--dim)}
  .gene{font-weight:600}
  .note{font-size:11.5px;color:var(--dim);margin-top:10px;line-height:1.5}
  .hide{display:none}
  .foot{padding:14px 26px 24px;color:var(--dim);font-size:11.5px;border-top:1px solid var(--line)}
  .foot code{color:#9fb0c0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:10px 12px;cursor:pointer;transition:.12s}
  .card:hover{border-color:#3d4a5a} .card.on{border-color:var(--accent);background:#182533}
</style>
<style>
  .annot{background:#182533;border:1px solid #2f5878;border-left:4px solid var(--accent);
    border-radius:7px;padding:10px 13px;margin:2px 0 14px;font-size:12.5px;line-height:1.55;color:#cdd9e6}
  .annot b{color:var(--ink)}
  .legend{display:flex;flex-wrap:wrap;gap:5px 12px;margin:8px 0 4px;font-size:11px;color:var(--dim)}
  .legend .lg{cursor:pointer;display:flex;align-items:center;gap:5px;padding:2px 4px;border-radius:4px}
  .legend .lg:hover{background:#161c24}
  .legend .lg.off{opacity:.32}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;flex:none}
  .claims{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
  .claimcard{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:10px 12px}
  .claimcard .need{font-size:13px;font-weight:650;color:var(--ink);margin-bottom:5px}
  .claimcard .cur{font-size:12px;color:#cdd4dd;line-height:1.5}
  .claimcard .cur b{color:var(--gof);font-weight:700;font-variant-numeric:tabular-nums}
  .claimcard .pain{font-size:11.5px;color:var(--dim);margin-top:5px;padding-left:11px;border-left:2px solid var(--stop)}
  .capbars{margin-top:6px}
  .caprow{margin-bottom:11px}
  .caprow .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .caprow .lab .nm{color:var(--ink);font-weight:600}
  .caprow .lab .z{color:var(--dim);font-variant-numeric:tabular-nums}
  .capbar{display:flex;height:22px;border-radius:5px;overflow:hidden;font-size:10.5px;font-weight:650}
  .capbar>span{display:flex;align-items:center;justify-content:center;color:#0d1117;min-width:0}
  .dot{cursor:pointer;transition:opacity .15s}
  .dot.off{opacity:.06}
  .capkey{display:flex;gap:14px;font-size:10.5px;color:var(--dim);margin:2px 0 14px}
  .capkey i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:-1px}
  #readout{min-height:18px;font-size:11.5px;color:var(--dim);margin-top:6px}
  #readout b{color:var(--ink)}
</style>
</head>

<header>
  <h1>0 of 91 &mdash; the capability the toolbox is missing</h1>
  <p id="thesis"></p>

<div class="wrap">
  <div class="col left">

    <div class="annot" id="annot"></div>
    <div class="legend" id="legend"></div>

    <p class="sub">What a target team needs vs. what the toolbox delivers</p>
    <div class="claims" id="claims"></div>

    <p class="sub">Capability across the 91 priors</p>
    <div class="capbars" id="capbars"></div>
    <div class="capkey">

      <span><i style="background:var(--gof)"></i>partial</span>
      <span><i style="background:#2a333f"></i>no</span>
    </div>
  </div>
</div>

const FAM = {"Perturbation-response prediction": "#6f9bd1", "GRN + in-silico perturbation": "#8f7fc4", "Foundation model": "#5aa6b8", "Benchmark / other": "#9aa4b0", "Virtual-cell / large perturbation model": "#c98fb0", "Combinatorial data / OT / design": "#7fb08a", "Structural / Boolean network control": "#d99b2b", "Boolean attractor control": "#c77f5a", "Structural network control": "#b8863f", "Control from data": "#c0b46a", "TF-reprogramming predictor": "#8a97a6", "Reachability oracle (this work)": "#4aa3df"};
document.getElementById("thesis").textContent = DATA.meta.thesis;

function seed(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0)/4294967296;}

// ---- quadrant scatter ----
const W=560,H=460,mL=64,mR=20,mT=22,mB=58;
const x0=mL,x1=W-mR,y0=H-mB,y1=mT;
const AX=["no","partial","yes"];
const cellW=(x1-x0)/3, cellH=(y0-y1)/3;
const cxCell=v=>x0+(v+0.5)*cellW;
const cyCell=v=>y0-(v+0.5)*cellH;
const jit=(g,ax)=>(seed(ax+"|"+g)-0.5)*0.62; // within-cell spread (prefix-differing seeds decorrelate x,y)
let offFam=new Set(), selM=null;

function px(m){return cxCell(m.measured)+jit(m.method+m.year,"x")*cellW;}
function py(m){return cyCell(m.feasibility)+jit(m.method+m.year,"y")*cellH;}

function drawQuad(){
  let s="";
  // shade the upper-right cell (measured=yes AND feasibility=yes)
  const qx=x0+2*cellW, qy=y1;
  s+=`<rect x="${qx}" y="${qy}" width="${cellW}" height="${cellH}" fill="var(--accent)" opacity="0.14"/>`;
  s+=`<rect x="${qx}" y="${qy}" width="${cellW}" height="${cellH}" fill="none" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.8"/>`;
  s+=`<text x="${qx+cellW/2}" y="${qy+16}" text-anchor="middle" fill="var(--accent)" font-size="10" font-weight="650" letter-spacing="0.4" opacity="0.9">MEASURED &times; FEASIBLE</text>`;
  // grid lines at cell boundaries
  for(let i=1;i<3;i++){
    s+=`<line x1="${x0+i*cellW}" y1="${y1}" x2="${x0+i*cellW}" y2="${y0}" stroke="var(--line)" stroke-width="1" opacity="0.5"/>`;
    s+=`<line x1="${x0}" y1="${y0-i*cellH}" x2="${x1}" y2="${y0-i*cellH}" stroke="var(--line)" stroke-width="1" opacity="0.5"/>`;
  }
  // frame
  s+=`<rect x="${x0}" y="${y1}" width="${x1-x0}" height="${y0-y1}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  // axis tick labels
  for(let i=0;i<3;i++){
    s+=`<text x="${cxCell(i)}" y="${y0+18}" text-anchor="middle" fill="var(--dim)" font-size="11">${AX[i]}</text>`;
    s+=`<text x="${x0-10}" y="${cyCell(i)+4}" text-anchor="end" fill="var(--dim)" font-size="11">${AX[i]}</text>`;
  }
  s+=`<text x="${(x0+x1)/2}" y="${y0+40}" text-anchor="middle" fill="var(--dim)" font-size="11.5">measured effects in the relevant cell type &#8594;</text>`;
  s+=`<text transform="rotate(-90 18,${(y0+y1)/2})" x="18" y="${(y0+y1)/2}" text-anchor="middle" fill="var(--dim)" font-size="11.5">feasibility verdict &#8594;</text>`;
  // points: priors first, this-work last (on top)
  const ms=[...DATA.methods].sort((a,b)=>(a.is_this_work?1:0)-(b.is_this_work?1:0));
  ms.forEach(m=>{
    const tw=m.is_this_work;
    const col=tw?"var(--accent)":(FAM[m.family]||"var(--dim)");
    const off = offFam.has(m.family) && !tw;
    const r=tw?8:3.6;
    const cls="dot"+(off?" off":"");
    const stroke=tw?"#e8edf2":col, sw=tw?2:0.5;
    s+=`<circle class="${cls}" data-m="${encodeURIComponent(m.method+'|'+m.year)}" cx="${px(m).toFixed(1)}" cy="${py(m).toFixed(1)}" r="${r}"
        fill="${col}" fill-opacity="${tw?1:0.8}" stroke="${stroke}" stroke-width="${sw}"/>`;
    if(tw){
      s+=`<text x="${(px(m)-13).toFixed(1)}" y="${(py(m)+4).toFixed(1)}" text-anchor="end" fill="var(--accent)" font-size="11.5" font-weight="700"
           style="paint-order:stroke;stroke:var(--bg);stroke-width:3px">this work &#9654;</text>`;
    }
  });
  document.getElementById("quad").innerHTML=s;
  document.querySelectorAll("#quad .dot").forEach(d=>{
    d.onmouseenter=()=>{const [mm,yy]=decodeURIComponent(d.dataset.m).split("|");
      const meth=DATA.methods.find(x=>x.method===mm&&String(x.year)===yy);
      if(meth)showReadout(meth);};
  });
}
function showReadout(m){
  const cap=[];
  cap.push(`measured <b>${AX[m.measured]}</b>`);
  cap.push(`feasibility <b>${AX[m.feasibility]}</b>`);
  cap.push(`certificate <b>${AX[m.certificate]}</b>`);
  document.getElementById("readout").innerHTML=
    `<b>${m.method}</b> (${m.year}) &middot; ${m.family} &mdash; ${cap.join(" &middot; ")}`;
}

// ---- annotation ----
const mc=DATA.prior_capability_counts;
document.getElementById("annot").innerHTML=
  `<b>${mc.measured_effects.yes} of ${DATA.meta.n_prior}</b> methods use measured data &mdash; all `+
  `${mc.measured_effects.yes} only predict or rank responses. `+
  `<b>${mc.feasibility_verdict.yes} of ${DATA.meta.n_prior}</b> return a feasibility verdict; `+
  `<b>${mc.infeasibility.yes} of ${DATA.meta.n_prior}</b> can prove a target is unreachable. `+
  `The measured&times;feasible cell has exactly one occupant &mdash; this work.`;

// ---- legend (family) ----
const fams=[...new Set(DATA.methods.filter(m=>!m.is_this_work).map(m=>m.family))];
const lg=document.getElementById("legend");
lg.innerHTML=fams.map(f=>`<span class="lg" data-f="${encodeURIComponent(f)}"><i style="background:${FAM[f]||'#8b97a6'}"></i>${f}</span>`).join("")
  + `<span class="lg" data-f="__tw"><i style="background:var(--accent)"></i>Reachability oracle (this work)</span>`;
lg.querySelectorAll(".lg").forEach(el=>el.onclick=()=>{
  const f=decodeURIComponent(el.dataset.f);
  if(f==="__tw")return;
  if(offFam.has(f))offFam.delete(f); else offFam.add(f);
  el.classList.toggle("off",offFam.has(f));
  drawQuad();
});

// ---- claims cards ----
document.getElementById("claims").innerHTML=DATA.meta.claims.map(c=>
  `<div class="claimcard"><div class="need">${c.need}</div>
   <div class="cur">${c.current.replace(/(\d+ of \d+|\d+)/g,'<b>$1</b>')}</div>
   <div class="pain">${c.pain}</div></div>`).join("");

// ---- capability stacked bars ----
const barOrder=[["measured_effects","measured effects"],["feasibility_verdict","feasibility verdict"],
                ["certificate","certificate"],["infeasibility","provable infeasibility"]];
document.getElementById("capbars").innerHTML=barOrder.map(([k,lab])=>{
  const d=mc[k], tot=d.yes+d.partial+d.no;
  const seg=(v,c,lbl)=> v>0?`<span style="flex-basis:${(v/tot*100).toFixed(1)}%;background:${c}${c==='#2a333f'?';color:#8b97a6':''}">${v}</span>`:"";
  return `<div class="caprow">
    <div class="lab"><span class="nm">${lab}</span><span class="z">yes ${d.yes} &middot; partial ${d.partial} &middot; no ${d.no}</span></div>
    <div class="capbar">${seg(d.yes,'var(--good)')}${seg(d.partial,'var(--gof)')}${seg(d.no,'#2a333f')}</div>
  </div>`;
}).join("");

document.getElementById("foot").innerHTML=
  "91 verified prior methods (2011&#8211;2026) from <code>method_comparison_matrix.csv</code> "+
  "(<code>RELATED_WORK.md</code> &sect;2), scored on four capabilities. "+
  "0 of 91 return a measured-data feasibility verdict; the reachability oracle is the sole occupant "+
  "of the measured &times; feasibility quadrant.";

drawQuad();
</script>
